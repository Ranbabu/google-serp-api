<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImageSearchMan - Custom</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333;
        }
        .header {
            padding: 20px 15px;
            background: white;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        h1 {
            font-size: 28px;
            margin: 0 0 20px 0;
            font-weight: normal;
            text-align: center;
        }
        .search-container {
            position: relative;
            margin-bottom: 20px;
        }
        .search-box {
            display: flex;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 25px;
            padding: 5px 15px;
            background: #f9f9f9;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px 5px;
            border: none;
            background: transparent;
            font-size: 16px;
            outline: none;
        }
        .search-btn {
            background: none;
            border: none;
            font-size: 18px;
            color: #666;
            cursor: pointer;
            padding: 10px;
        }
        
        /* History Section */
        .history-section {
            padding: 0 15px;
        }
        .history-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            border: 1px solid #eee;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-size: 15px;
            cursor: pointer;
        }
        .history-item:last-child {
            border-bottom: none;
        }
        .delete-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #333;
            font-weight: bold;
        }

        /* Image Grid */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 5px;
            padding: 5px;
            display: none; /* Initially hidden */
        }
        .image-item {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 4px;
            background: #eee;
        }
        .loading {
            text-align: center;
            padding: 20px;
            display: none;
            font-size: 16px;
            color: #666;
        }
        .back-btn {
            display: none;
            background: none;
            border: none;
            font-size: 20px;
            margin-right: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <div style="display: flex; align-items: center;">
            <button id="backBtn" class="back-btn" onclick="showHistory()">←</button>
            <h1>ImageSearchMan</h1>
        </div>
        
        <div class="search-container">
            <div class="search-box">
                <span style="color: #999;">🔍</span>
                <input type="text" id="searchInput" placeholder="सर्च करें..." onkeypress="handleKeyPress(event)">
                <button class="search-btn" onclick="triggerSearch()">खोजें</button>
            </div>
        </div>
    </div>

    <div id="historySection" class="history-section">
        <div class="history-title">Search History</div>
        <ul id="historyList" class="history-list">
            </ul>
    </div>

    <div id="loading" class="loading">इमेजेज लोड हो रही हैं...</div>
    <div id="imageGrid" class="image-grid"></div>

    <script>
        // आपका लाइव API URL यहाँ ऐड कर दिया गया है
        const API_URL = "https://Google-serp-api.babu902654.workers.dev/?q=";

        // पेज लोड होने पर हिस्ट्री दिखाएं
        document.addEventListener("DOMContentLoaded", loadHistory);

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                triggerSearch();
            }
        }

        function triggerSearch() {
            const query = document.getElementById("searchInput").value.trim();
            if (query) {
                saveToHistory(query);
                fetchImages(query);
            }
        }

        async function fetchImages(query) {
            // UI बदलना (हिस्ट्री छिपाना, ग्रिड दिखाना)
            document.getElementById("historySection").style.display = "none";
            document.getElementById("backBtn").style.display = "block";
            
            const grid = document.getElementById("imageGrid");
            const loading = document.getElementById("loading");

            grid.innerHTML = "";
            grid.style.display = "none";
            loading.style.display = "block";

            try {
                const response = await fetch(API_URL + encodeURIComponent(query));
                const data = await response.json();

                grid.style.display = "grid";
                
                if (data.results && data.results.length > 0) {
                    data.results.forEach(item => {
                        const img = document.createElement("img");
                        img.src = item.url;
                        img.className = "image-item";
                        img.loading = "lazy";
                        grid.appendChild(img);
                    });
                } else {
                    grid.innerHTML = "<p style='padding:15px; grid-column: 1 / -1;'>कोई इमेज नहीं मिली।</p>";
                }
            } catch (error) {
                console.error("Error fetching images:", error);
                grid.style.display = "block";
                grid.innerHTML = "<p style='padding:15px; color:red;'>कुछ गलत हो गया। कृपया दोबारा कोशिश करें।</p>";
            } finally {
                loading.style.display = "none";
            }
        }

        // --- Search History Logic ---
        
        function getHistory() {
            const history = localStorage.getItem('imageSearchHistory');
            return history ? JSON.parse(history) : [];
        }

        function saveToHistory(query) {
            let history = getHistory();
            // अगर पहले से है तो हटाकर सबसे ऊपर लाएं
            history = history.filter(item => item !== query);
            history.unshift(query);
            
            // 10 से ज्यादा सेव न करें
            if (history.length > 10) history.pop(); 
            
            localStorage.setItem('imageSearchHistory', JSON.stringify(history));
            loadHistory();
        }

        function deleteHistoryItem(event, query) {
            event.stopPropagation(); // क्लिक को सर्च होने से रोकें
            let history = getHistory();
            history = history.filter(item => item !== query);
            localStorage.setItem('imageSearchHistory', JSON.stringify(history));
            loadHistory();
        }

        function loadHistory() {
            const history = getHistory();
            const list = document.getElementById("historyList");
            list.innerHTML = "";

            if (history.length === 0) {
                list.innerHTML = "<li style='padding:15px; color:#999; text-align:center;'>कोई हिस्ट्री नहीं है</li>";
            } else {
                history.forEach(query => {
                    const li = document.createElement("li");
                    li.className = "history-item";
                    li.onclick = () => {
                        document.getElementById("searchInput").value = query;
                        fetchImages(query);
                    };
                    
                    li.innerHTML = `
                        <span>${query}</span>
                        <button class="delete-btn" onclick="deleteHistoryItem(event, '${query}')">✕</button>
                    `;
                    list.appendChild(li);
                });
            }
        }

        function showHistory() {
            document.getElementById("historySection").style.display = "block";
            document.getElementById("imageGrid").style.display = "none";
            document.getElementById("loading").style.display = "none";
            document.getElementById("backBtn").style.display = "none";
            document.getElementById("searchInput").value = "";
            loadHistory();
        }
    </script>
</body>
</html>
